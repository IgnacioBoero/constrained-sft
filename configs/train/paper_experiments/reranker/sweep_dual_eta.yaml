# @package _global_
# Appendix F Fig. 14 — standard dual: dual step η ∈ {10⁻³, …, 1}; ε = 3, augmentation off (linear dual).

defaults:
  - paper_rerank_shared

hydra:
  mode: MULTIRUN
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    params:
      exp.loss_type: dual
      exp.loss_tol: 3.0
      exp.loss_alpha: 1.0
      exp.dual_step_size: 0.001, 0.01, 0.1, 1.0
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweep:
    dir: ./multirun/paper_rerank/dual_eta
    subdir: ${hydra.job.num}

exp:
  loss_type: dual
  loss_tol: 3.0
  loss_alpha: 1.0
  dual_step_size: 0.1
