# @package _global_
# Table 12 — pointwise augmented dual: constraint tolerance ε ∈ {1, 3} (paper “point”; Fig. 4 labels).
# Augmentation fixed to α = 1 (Appendix F Fig. 14 augmented-dual caption); dual step η = 0.1.

defaults:
  - paper_rerank_shared

hydra:
  mode: MULTIRUN
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    params:
      exp.loss_type: aug_dual
      exp.loss_alpha: 1.0
      exp.dual_step_size: 0.1
      exp.loss_tol: 1.0, 3.0
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweep:
    dir: ./multirun/paper_rerank/pointwise
    subdir: ${hydra.job.num}

exp:
  loss_type: aug_dual
  loss_tol: 3.0
  loss_alpha: 1.0
  dual_step_size: 0.1
