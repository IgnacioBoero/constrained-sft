# @package _global_
# Appendix F Table 13 — robustness of augmented dual to augmentation α ∈ {1, 10, 100, 1000}; ε = 3, η_dual = 0.1.

defaults:
  - paper_rerank_shared

hydra:
  mode: MULTIRUN
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    params:
      exp.loss_type: aug_dual
      exp.loss_tol: 3.0
      exp.dual_step_size: 0.1
      exp.loss_alpha: 1.0, 10.0, 100.0, 1000.0
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweep:
    dir: ./multirun/paper_rerank/aug_dual_alpha
    subdir: ${hydra.job.num}

exp:
  loss_type: aug_dual
  loss_tol: 3.0
  loss_alpha: 1.0
  dual_step_size: 0.1
