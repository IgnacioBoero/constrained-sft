# @package _global_
# Fig. 4: pointwise ε = 1 branch; augmented dual α = 1, η = 0.1.

defaults:
  - paper_rerank_shared

hydra:
  mode: MULTIRUN
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    params:
      train.seed: 42, 43, 44

  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher

  sweep:
    dir: ./multirun/paper_rerank/seeds_point_eps1
    subdir: ${hydra.job.num}

exp:
  loss_type: aug_dual
  loss_tol: 1.0
  loss_alpha: 1.0
  dual_step_size: 0.1
