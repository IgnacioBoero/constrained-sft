# @package _global_
# Table 9: average constrained dual — sweep ε_U (unsafe refusal floor); ε_H = −2 is exp.tol2.

defaults:
  - paper_safety_shared

hydra:
  mode: MULTIRUN
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    params:
      exp.loss_type: avg
      exp.loss_alpha: 1000.0
      exp.dual_step_size: 1.0
      exp.tol2: -2.0
      exp.tol: 0.08, 0.16, -0.24, -0.28, -0.32

  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher

  sweep:
    dir: ./multirun/paper_safety/avg
    subdir: ${hydra.job.num}

exp:
  loss_type: avg
  loss_alpha: 1000.0
  dual_step_size: 1.0
  tol: -0.28
  tol2: -2.0
