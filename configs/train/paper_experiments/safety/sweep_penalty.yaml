# @package _global_
# Table 9: fixed scalar penalty λ0 = 5 (implemented as loss_type=penalty, exp.loss_alpha).

defaults:
  - paper_safety_shared

hydra:
  mode: MULTIRUN
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    params:
      exp.loss_type: penalty
      exp.loss_alpha: 5.0
      exp.dual_step_size: 0.0
      exp.tol2: -2.0
      exp.tol: 0.08

  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher

  sweep:
    dir: ./multirun/paper_safety/penalty
    subdir: ${hydra.job.num}

exp:
  loss_type: penalty
  loss_alpha: 5.0
  dual_step_size: 0.0
  tol: 0.08
  tol2: -2.0
