# @package _global_
# Figure 3: pointwise augmented dual (“point”; ε_U = 0.08 per Table 9 resilient row / point sweep).
# Three RNG seeds.

defaults:
  - paper_safety_shared

hydra:
  mode: MULTIRUN
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    params:
      train.seed: 42,43,44

  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher

  sweep:
    dir: ./multirun/paper_safety/fig3_seeds/point_eps008
    subdir: ${hydra.job.num}

exp:
  loss_type: aug_dual
  loss_alpha: 1000.0
  dual_step_size: 1.0
  tol: 0.08
  tol2: -2.0
