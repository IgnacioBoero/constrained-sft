# @package _global_
# Table 9: resilient (relaxation) — fixed ε_U = 0.08, ε_H = −2; sweep β ∈ {5, 10, 20}.

defaults:
  - paper_safety_shared

hydra:
  mode: MULTIRUN
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    params:
      exp.loss_type: resilient
      exp.loss_alpha: 1000.0
      exp.dual_step_size: 1.0
      exp.tol: 0.08
      exp.tol2: -2.0
      exp.resilient_coef: 5, 10, 20

  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher

  sweep:
    dir: ./multirun/paper_safety/resilient
    subdir: ${hydra.job.num}

exp:
  loss_type: resilient
  loss_alpha: 1000.0
  dual_step_size: 1.0
  tol: 0.08
  tol2: -2.0
  resilient_coef: 10
