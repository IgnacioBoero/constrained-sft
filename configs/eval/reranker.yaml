# @package _global_

# Path to the train config file that was used for training (paper appendix shared block)
train_config: "configs/train/paper_experiments/reranker/paper_rerank_shared.yaml"

# Basic evaluation settings
train:
  seed: 42
  data_proportion: 1.0  # Use full dataset for evaluation
  size: large           # Paper appendix D.2 pooled subset (`iboero16/reranker`, cfg `large`)
  dropout: 0.05        # Matches `paper_rerank_shared.yaml`
  output_dir: "./outputs/eval"  # Temporary output dir for evaluation
  hf_args:
    per_device_eval_batch_size: 2
    bf16: true
    fp16: false

# Experiment configuration (should match training)
exp:
  name: "reranker"
  model_name: "answerdotai/ModernBERT-base"
  num_negatives: 9
  max_length: 512